<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

/* ======================
メニュー
====================== */

#menuScreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px; 
background: linear-gradient(180deg, #101820, #1d2d44);
z-index:9999;
}

#gameTitle{
font-size:42px;
font-weight:bold;
color:gold;
margin-bottom: 20px; 
}

.menuGuide{
font-size:16px;
color:#e0e0e0;
text-align:center;
margin-bottom: -5px; 
line-height:1.4;
}

.menuGroup{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.menuBtn{
width:260px;
padding:18px;
border:none;
border-radius:18px;
font-size:24px;
color:white;
background: linear-gradient(135deg, #ff9800, #ff5722);
cursor: pointer;
}

/* ======================
戻る
====================== */

#backToMenuBtn{
position:fixed;
top:20px;
left:20px;
display:none;
z-index:99999;
padding:12px 20px;
border:none;
border-radius:14px;
background:rgba(0,0,0,.8);
color:white;
cursor: pointer;
}

/* ======================
場所確認
====================== */

#hintScreen{
position:fixed;
inset:0;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background: linear-gradient(180deg, #111827, #1e293b);
z-index:20000;
}

#hintScreen img{
width:250px;
border-radius:20px;
}

.backBtn{
padding:14px 28px;
border:none;
border-radius:18px;
background:#ff9800;
color:white;
font-size:22px;
cursor: pointer;
}

/* ======================
★画面固定フォトフレーム UI
====================== */

/* 画面全体にぴったり固定するフレーム */
#photoFrameOverlay {
position: fixed;
inset: 0;
display: none;
z-index: 9998; /* カメラ映像の上、UIの下 */
pointer-events: none; /* 下のカメラやボタンをタップできるようにスルー */
justify-content: center;
align-items: center;
}

#photoFrameOverlay img {
width: 80%; /* 撮影ロジックに合わせたサイズ */
height: auto;
max-height: 80vh;
object-fit: contain;
}

#captureBtn{
position:fixed;
bottom:100px;
left:50%;
transform:translateX(-50%);
padding:18px 32px;
font-size:24px;
border:none;
border-radius:20px;
background:#ff9800;
color:white;
z-index:99999;
display:none;
cursor: pointer;
}

/* ★追加: フレームを消すための閉じるボタン */
#closeFrameBtn {
position: fixed;
top: 20px;
right: 20px;
padding: 12px 18px;
font-size: 20px;
border: none;
border-radius: 14px;
background: rgba(255, 59, 48, 0.9);
color: white;
font-weight: bold;
z-index: 99999;
display: none;
cursor: pointer;
}

</style>
</head>

<body>

<div id="menuScreen">

<div id="gameTitle">
フォトスポットAR
</div>

<div class="menuGroup">
<div class="menuGuide">まずはここで読み込んでね！</div>
<button id="startBtn" class="menuBtn">
読み込み開始
</button>
</div>

<div class="menuGroup">
<div class="menuGuide">ここでフォトスポットの場所を確認できるよ！</div>
<button id="openHintBtn" class="menuBtn">
場所確認
</button>
</div>

</div>

<button id="backToMenuBtn">
メニューへ戻る
</button>

<div id="hintScreen">
<h1 style="color:gold;">場所確認</h1>
<img src="hint_p.jpg">
<button id="closeHintBtn" class="backBtn">戻る</button>
</div>

<div id="photoFrameOverlay">
<img src="frame.png" id="overlayFrameImg">
</div>
<button id="captureBtn">📸 撮影する</button>
<button id="closeFrameBtn">❌ 閉じる</button>

<a-scene
id="mainScene"
style="display:none"
mindar-image="imageTargetSrc: targets.mind; maxTrack:1;"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-camera camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity id="targetPhoto" mindar-image-target="targetIndex:8"></a-entity>

</a-scene>

<script>
const menuScreen = document.querySelector("#menuScreen");
const mainScene = document.querySelector("#mainScene");
const startBtn = document.querySelector("#startBtn");
const backBtn = document.querySelector("#backToMenuBtn");
const hintScreen = document.querySelector("#hintScreen");
const captureBtn = document.querySelector("#captureBtn");
const targetPhoto = document.querySelector("#targetPhoto");

// ★追加したUI
const photoFrameOverlay = document.querySelector("#photoFrameOverlay");
const closeFrameBtn = document.querySelector("#closeFrameBtn");

// マーカーが読み込まれてフレームが固定されているかのフラグ
let isFrameActive = false;

/* ======================
AR開始
====================== */
startBtn.addEventListener("click", async ()=>{
menuScreen.style.display="none";
mainScene.style.display="block";
backBtn.style.display="block";

await new Promise(resolve=> setTimeout(resolve,200));

const arSystem = mainScene.systems["mindar-image-system"];
if(arSystem){
await arSystem.start();
}
});

/* ======================
戻る（メニューへ）
====================== */
backBtn.addEventListener("click", async ()=>{
const arSystem = mainScene.systems["mindar-image-system"];
if(arSystem){
await arSystem.stop();
}
// すべての状態をリセット
resetPhotoFrame();

mainScene.style.display="none";
menuScreen.style.display="flex";
backBtn.style.display="none";
});

/* ======================
場所確認
====================== */
document.querySelector("#openHintBtn").addEventListener("click",()=>{
hintScreen.style.display="flex";
});

document.querySelector("#closeHintBtn").addEventListener("click",()=>{
hintScreen.style.display="none";
});

/* ======================
★フォトフレーム・撮影ボタンを消す処理（閉じるボタン）
====================== */
function resetPhotoFrame() {
isFrameActive = false;
photoFrameOverlay.style.display = "none";
captureBtn.style.display = "none";
closeFrameBtn.style.display = "none";
backBtn.style.display = "block"; // 戻るボタンを再表示
}

closeFrameBtn.addEventListener("click", resetPhotoFrame);

/* ======================
フォトスポット（撮影・保存）
====================== */
captureBtn.addEventListener("click", async ()=>{
try{
captureBtn.style.display="none";
closeFrameBtn.style.display="none";
const video = document.querySelector("video");
if(!video){
alert("カメラ取得失敗");
captureBtn.style.display="block";
closeFrameBtn.style.display="block";
return;
}

const canvas = document.querySelector("#captureCanvas");
const ctx = canvas.getContext("2d");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

/* カメラ映像 */
ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

/* ARフレーム（画面固定と同じ比率で書き込み） */
const frame = document.querySelector("#overlayFrameImg");
if(frame.complete){
const frameWidth = canvas.width * 0.8;
const frameHeight = frameWidth * (frame.naturalHeight / frame.naturalWidth);
const x = (canvas.width - frameWidth)/2;
const y = (canvas.height - frameHeight)/2;
ctx.drawImage(frame, x, y, frameWidth, frameHeight);
}

/* 保存 */
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
if(isIOS){
const imageURL = canvas.toDataURL("image/jpeg", 0.95);
const win = window.open();
if(win){
win.document.write('<img src="'+imageURL+'" style="width:100%">');
}else{
location.href = imageURL;
}
}else{
const link = document.createElement("a");
link.download = "photo_spot.jpg";
link.href = canvas.toDataURL("image/jpeg", 0.95);
link.click();
}
} catch(e){
console.error(e);
alert("撮影失敗");
}
captureBtn.style.display="block";
closeFrameBtn.style.display="block";
});

/* ======================
★ターゲット認識時の切り替え
====================== */
targetPhoto.addEventListener("targetFound", ()=>{
// すでにフレーム表示中なら何もしない
if (isFrameActive) return;

isFrameActive = true;
photoFrameOverlay.style.display = "flex"; // 画面固定フォトフレーム表示
captureBtn.style.display = "block";       // 撮影ボタン表示
closeFrameBtn.style.display = "block";   // 閉じるボタン表示
backBtn.style.display = "none";          // 撮影中邪魔にならないようメニュー戻るボタンを隠す
});

// 画面固定になったため、Mind-AR側でロストしても自動では何も消さない
targetPhoto.addEventListener("targetLost", ()=>{
// 処理なし（「閉じる」が押されるまで表示をキープ）
});
</script>

<canvas id="captureCanvas" style="display:none;"></canvas>

</body>
</html>
