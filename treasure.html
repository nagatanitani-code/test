<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
}

/* ======================
   メニュー（スクロール＆画面最適化）
====================== */

#menuScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center; /* 中央揃え */
  gap:24px; /* 各グループの間隔を少し広げてスッキリと */
  padding: 40px 20px; /* 上下にスクロールした際の余白を確保 */
  box-sizing: border-box;
  background:
  linear-gradient(
    180deg,
    #101820,
    #1d2d44
  );
  z-index:9999;
  overflow-y: auto; /* 項目が増えたら自動で縦スクロール可能にする */
  -webkit-overflow-scrolling: touch; /* iOSでのスクロールを滑らかに */
}

#gameTitle{
  font-size:42px;
  font-weight:bold;
  color:gold;
  margin-bottom: 10px; 
  text-shadow:
  0 0 20px rgba(255,215,0,.7);
  text-align: center;
}

/* 説明文とボタンを綺麗に縦並びにするグループ */
.menuGroup{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px; 
  width: 100%;
  max-width: 320px; /* ボタン全体の最大幅 */
}

/* 各ボタンの解説テキスト用スタイル */
.menuGuide{
  font-size:14px;
  color:#e0e0e0;
  text-align:center;
  line-height:1.4;
  letter-spacing: 0.5px;
}

.menuBtn{
  width:100%; /* グループの幅（max-width）いっぱいに広げる */
  max-width: 280px;
  padding:18px;
  border:none;
  border-radius:18px;
  font-size:24px;
  font-weight:bold;
  color:white;
  background:
  linear-gradient(
    135deg,
    #ff9800,
    #ff5722
  );
  box-shadow: 0 6px 18px rgba(0,0,0,.4);
  cursor: pointer;
}

/* 【新規追加】コンプリート特典用の特別な金・青グラデーションボタン */
#openBonusBtn {
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  box-shadow: 0 6px 22px rgba(0, 198, 255, 0.4);
}

/* ======================
   戻るボタン
====================== */

#backToMenuBtn{
  position:fixed;
  top:20px;
  left:20px;
  z-index:9999;
  display:none;
  padding:12px 20px;
  border:none;
  border-radius:14px;
  background:rgba(0,0,0,.8);
  color:white;
  font-size:18px;
  cursor: pointer;
}

/* ======================
   お宝BOX
====================== */

#treasureBox{
  position:fixed;
  top:15px;
  right:15px;
  z-index:999;
  display:none;
  text-align:center;
  padding:15px;
  border-radius:20px;
  color:white;
  background:
  rgba(0,0,0,.75);
}

#treasureTitle{
  font-size:12px;
  color:gold;
}

#treasureCount{
  font-size:28px;
  font-weight:bold;
}

#treasureImage{
  width:120px;
  margin-top:10px;
  border-radius:12px;
}

/* ======================
   発見演出
====================== */

#treasureEffect{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:
  translateX(-50%);
  background:gold;
  color:black;
  font-size:24px;
  font-weight:bold;
  padding:12px 24px;
  border-radius:14px;
  display:none;
  z-index:9999;
}

/* ======================
   共通サブ画面（全面スクロール・レスポンシブ化）
====================== */

#treasureScreen,
#hintScreen{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  align-items:center;
  gap:25px;
  padding: 40px 20px;
  box-sizing: border-box;
  background:
  linear-gradient(
    180deg,
    #111827,
    #1e293b
  );
  z-index:20000;
  overflow-y: auto; /* 画像が増えたらスクロールできるようにする */
  -webkit-overflow-scrolling: touch;
}

/* ======================
   図鑑画面（グリッド配置）
====================== */

.treasureGrid{
  display:flex;
  flex-wrap: wrap; /* 横幅が足りなくなったら自動で折り返す */
  justify-content: center;
  gap:20px;
  width: 100%;
  max-width: 600px; /* 大画面でも広がりすぎないように制限 */
}

.treasureGrid img{
  width:130px; /* スマホで2列に並びやすいサイズに変更 */
  height:130px;
  border-radius:18px;
  background:white;
  object-fit: cover;
  box-shadow: 0 6px 18px rgba(0,0,0,.4);
}

.backBtn{
  padding:16px 30px;
  border:none;
  border-radius:18px;
  font-size:22px;
  background:#ff9800;
  color:white;
  cursor: pointer;
  margin-top: auto; /* コンテンツが少ないときは最下部、多いときは下に押し出される */
  flex-shrink: 0; /* スクロール時にボタンが潰れるのを防ぐ */
}

/* ======================
   場所確認画面（グリッド配置）
====================== */

.hintGrid{
  display:flex;
  flex-wrap: wrap; /* 自動折り返し */
  justify-content: center;
  gap:20px;
  width: 100%;
  max-width: 600px;
}

.hintGrid img{
  width:140px; /* 横幅に合わせて綺麗にフィット */
  height:140px;
  border-radius:20px;
  object-fit: cover;
  box-shadow: 0 6px 18px rgba(0,0,0,.4);
}

/* ======================
   コンプリート
====================== */

#completeTreasure{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:25px;
  background:
  rgba(0,0,0,.85);
  z-index:30000;
}

#completeText{
  font-size:42px;
  font-weight:bold;
  color:gold;
}

#downloadWallpaperBtn{
  padding:18px 30px;
  border:none;
  border-radius:18px;
  font-size:24px;
  color:white;
  background:
  linear-gradient(
    135deg,
    #00c6ff,
    #0072ff
  );
  cursor: pointer;
}

#closeCompleteBtn{
  position:absolute;
  top:20px;
  right:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:rgba(0,0,0,.8);
  color:white;
  font-size:32px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:2px solid white;
}

</style>
</head>

<body>

<div id="menuScreen">

  <div id="gameTitle">
    お宝探しAR
  </div>

  <div class="menuGroup">
    <div class="menuGuide">最初にここから読み込んでね！</div>
    <button id="startBtn" class="menuBtn">
      探索開始
    </button>
  </div>

  <div class="menuGroup">
    <div class="menuGuide">ここで取得したお宝を確認できるよ！</div>
    <button id="openTreasureBtn" class="menuBtn">
      お宝図鑑
    </button>
  </div>

  <div class="menuGroup">
    <div class="menuGuide">ここでお宝の場所を確認できるよ！</div>
    <button id="openHintBtn" class="menuBtn">
      場所確認
    </button>
  </div>

  <div class="menuGroup" id="bonusGroup" style="display: none;">
    <div class="menuGuide" style="color: gold; font-weight: bold;">🎉 全てのお宝を見つけた特典！</div>
    <button id="openBonusBtn" class="menuBtn">
      コンプリート特典
    </button>
  </div>

</div>

<button id="backToMenuBtn">
メニューへ戻る
</button>

<div id="treasureBox">

  <div id="treasureTitle">
    お宝発見数
  </div>

  <div id="treasureCount">
    0 / 2
  </div>

  <img id="treasureImage" src="">

</div>

<div id="treasureEffect">
宝発見！
</div>

<div id="treasureScreen">

  <h1 style="color:gold; margin: 0; font-size: 38px;">
    お宝図鑑
  </h1>

  <div class="treasureGrid">
    <img id="menuTreasure1" src="treasure_unknown.jpg">
    <img id="menuTreasure2" src="treasure_unknown.jpg">
  </div>

  <button id="closeTreasureBtn" class="backBtn">
    戻る
  </button>

</div>

<div id="hintScreen">

  <h1 style="color:gold; margin: 0; font-size: 38px;">
    場所確認
  </h1>

  <div class="hintGrid">
    <img src="hint1.jpg">
    <img src="hint2.jpg">
  </div>

  <button id="closeHintBtn" class="backBtn">
    戻る
  </button>

</div>

<div id="completeTreasure">
  <div id="closeCompleteBtn">×</div>
  <div id="completeText">COMPLETE!!</div>
  <button id="downloadWallpaperBtn">
    wallpaper入手
  </button>
</div>

<a-scene
id="mainScene"
style="display:none"
mindar-image="imageTargetSrc: targets.mind; maxTrack:1; autoStart:false;"
color-space="sRGB"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-assets>
  <img id="coinImg" src="coin.jpg">
  <img id="goldImg" src="gold.jpg">
</a-assets>

<a-camera camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity id="targetCoin" mindar-image-target="targetIndex:3">
  <a-plane width="0.01" height="0.01" visible="false"></a-plane>
</a-entity>

<a-entity id="targetGold" mindar-image-target="targetIndex:4">
  <a-plane width="0.01" height="0.01" visible="false"></a-plane>
</a-entity>

</a-scene>


<script>

// ======================
// 基本変数
// ======================
const menuScreen = document.querySelector("#menuScreen");
const mainScene = document.querySelector("#mainScene");
const startBtn = document.querySelector("#startBtn");
const backToMenuBtn = document.querySelector("#backToMenuBtn");
const treasureEffect = document.querySelector("#treasureEffect");
const treasureCount = document.querySelector("#treasureCount");
const treasureImage = document.querySelector("#treasureImage");
const treasureBox = document.querySelector("#treasureBox");
const completeTreasure = document.querySelector("#completeTreasure");
const bonusGroup = document.querySelector("#bonusGroup");

let coinFound = false;
let goldFound = false;

let foundTreasure = 0;
const totalTreasure = 2;


// ======================
// セーブ
// ======================
function saveGame(){
  localStorage.setItem(
    "treasureSave",
    JSON.stringify({
      coinFound,
      goldFound
    })
  );
}


// ======================
// ロード
// ======================
function loadGame(){
  const saveData = JSON.parse(localStorage.getItem("treasureSave"));
  if(!saveData) return;

  coinFound = saveData.coinFound || false;
  goldFound = saveData.goldFound || false;

  foundTreasure = 0;
  if(coinFound) foundTreasure++;
  if(goldFound) foundTreasure++;

  treasureCount.innerHTML = `${foundTreasure} / ${totalTreasure}`;
  
  // ロード時にコンプリート特典ボタンの表示を更新
  updateBonusButton();
}


// ======================
// 【新規追加】コンプリート特典ボタンの表示切り替え
// ======================
function updateBonusButton() {
  if (foundTreasure >= totalTreasure) {
    bonusGroup.style.display = "flex";
  } else {
    bonusGroup.style.display = "none";
  }
}


// ======================
// コンプリート判定
// ======================
function checkCompleteTreasure(){
  if(foundTreasure >= totalTreasure){
    // メニュー側のボタンも出現させる
    updateBonusButton();
    
    setTimeout(() => {
      completeTreasure.style.display = "flex";
    }, 1000);
  }
}


// ======================
// coin
// ======================
document.querySelector("#targetCoin").addEventListener("targetFound", () => {
  treasureBox.style.display = "block";
  treasureImage.src = "coin.jpg";

  if(!coinFound){
    coinFound = true;
    foundTreasure++;
    treasureCount.innerHTML = `${foundTreasure} / ${totalTreasure}`;
    treasureEffect.innerHTML = "お宝発見！";
    saveGame();
    checkCompleteTreasure();
  }else{
    treasureEffect.innerHTML = "発見済みのお宝";
  }

  treasureEffect.style.display = "block";
  setTimeout(() => {
    treasureEffect.style.display = "none";
  }, 1500);
});


// ======================
// gold
// ======================
document.querySelector("#targetGold").addEventListener("targetFound", () => {
  treasureBox.style.display = "block";
  treasureImage.src = "gold.jpg";

  if(!goldFound){
    goldFound = true;
    foundTreasure++;
    treasureCount.innerHTML = `${foundTreasure} / ${totalTreasure}`;
    treasureEffect.innerHTML = "大物発見！！";
    saveGame();
    checkCompleteTreasure();
  }else{
    treasureEffect.innerHTML = "発見済みのお宝";
  }

  treasureEffect.style.display = "block";
  setTimeout(() => {
    treasureEffect.style.display = "none";
  }, 1500);
});


// ======================
// 壁紙DL
// ======================
document.querySelector("#downloadWallpaperBtn").addEventListener("click", () => {
  const link = document.createElement("a");
  link.href = "wallpaper.jpg";
  link.download = "wallpaper.jpg";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});


// ======================
// AR開始（探索開始が押されたタイミングでカメラをONにする）
// ======================
startBtn.addEventListener("click", async () => {
  menuScreen.style.display = "none";
  mainScene.style.display = "block";
  backToMenuBtn.style.display = "block";

  await new Promise(resolve => setTimeout(resolve, 200));

  const arSystem = mainScene.systems["mindar-image-system"];
  if(arSystem){
    await arSystem.start(); // ここでカメラを確実起動
  }
});


// ======================
// メニューへ戻る（メニューに戻るタイミングでカメラとビデオ要素を完全にOFFにする）
// ======================
backToMenuBtn.addEventListener("click", async () => {
  const arSystem = mainScene.systems["mindar-image-system"];
  if(arSystem){
    try{
      await arSystem.stop(); // MindARのシステム停止
    }catch(e){
      console.log(e);
    }
  }

  // ★ 生成されたビデオ要素を削除し、デバイスのカメラレンズ自体も完全にクローズ（電源OFF）する
  const video = document.querySelector("video");
  if (video) {
    if (video.srcObject) {
      const tracks = video.srcObject.getTracks();
      tracks.forEach(track => track.stop()); // スマホのインジケータ（緑の点など）を消す
    }
    video.remove(); // 画面裏に残る古い描写要素を完全にクリーンアップ
  }

  mainScene.style.display = "none";
  menuScreen.style.display = "flex";
  backToMenuBtn.style.display = "none";
  treasureBox.style.display = "none";
});

// ======================
// 各画面の切り替えイベント
// ======================
const treasureScreen = document.querySelector("#treasureScreen");

document.querySelector("#openTreasureBtn").addEventListener("click", () => {
  treasureScreen.style.display = "flex";
  if(coinFound){
    document.querySelector("#menuTreasure1").src = "coin.jpg";
  }
  if(goldFound){
    document.querySelector("#menuTreasure2").src = "gold.jpg";
  }
});

document.querySelector("#closeTreasureBtn").addEventListener("click", () => {
  treasureScreen.style.display = "none";
});

const hintScreen = document.querySelector("#hintScreen");

document.querySelector("#openHintBtn").addEventListener("click", () => {
  hintScreen.style.display = "flex";
});

document.querySelector("#closeHintBtn").addEventListener("click", () => {
  hintScreen.style.display = "none";
});

document.querySelector("#closeCompleteBtn").addEventListener("click", () => {
  completeTreasure.style.display = "none";
});

// 【新規追加】メニューからコンプリート特典画面を開く
document.querySelector("#openBonusBtn").addEventListener("click", () => {
  completeTreasure.style.display = "flex";
});

// ======================
// 起動時ロード
// ======================
loadGame();

</script>

</body>
</html>
