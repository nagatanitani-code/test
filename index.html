<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #effect {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: yellow;
      font-size: 48px;
      font-weight: bold;
      display: none;
      z-index: 999;
      animation: pop 0.8s ease;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.2); opacity:0; }
      50% { transform: translate(-50%, -50%) scale(1.4); }
      100% { transform: translate(-50%, -50%) scale(1); opacity:1; }
    }
  </style>
</head>

<body>

<div id="effect">発見!!</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; maxTrack: 3;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

<a-assets>
 <img id="img1" src="ar-image1.jpg" />
 <img id="img2" src="ar-image2.jpg" />
 <img id="img3" src="ar-image3.jpg" />
 </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false">

    <!-- クリック判定 -->
   <a-cursor fuse="false" raycaster="objects: .clickable"> </a-cursor>
</a-camera>

  <!-- 画像1 -->
  <a-entity mindar-image-target="targetIndex: 0">
<a-plane src="#img1" width="1" height="1"material="shader: flat; transparent: true;"> </a-plane>
   <a-plane class="clickable" color="red" opacity="0.3" width="0.2" height="0.2" position="0.15 -0.1 0.02" event-set__enter="_event: mouseenter; color: blue"> </a-plane>

  </a-entity>

  <!-- 画像2 -->
  <a-entity mindar-image-target="targetIndex: 1">

  <a-plane src="#img2"  width="1" height="1"material="shader: flat; transparent: true;"> </a-plane>
<a-plane class="clickable" color="red" opacity="0.3" width="0.2" height="0.2" position="0.15 -0.1 0.02" event-set__enter="_event: mouseenter; color: blue"> </a-plane>

 </a-entity>
<!-- 画像3 --> 
<a-entity mindar-image-target="targetIndex: 2">
<a-plane src="#img3"  width="1" height="1"material="shader: flat; transparent: true;"> </a-plane>
<a-plane class="clickable" color="red" opacity="0.3" width="0.2" height="0.2" position="0.15 -0.1 0.02" event-set__enter="_event: mouseenter; color: blue"> </a-plane>

</a-entity>
</a-scene>



<script>

const effect = document.querySelector("#effect");

document.querySelector("a-scene").addEventListener("loaded", () => {

  document.querySelectorAll(".clickable").forEach(el => {

    // PCクリック
    el.addEventListener("click", showEffect);

    // スマホタップ
    el.addEventListener("touchstart", showEffect);

  });

});

function showEffect() {

  console.log("発見！");

  effect.style.display = "block";

  const audio = new Audio("discover.mp3");
  audio.play();

  setTimeout(() => {
    effect.style.display = "none";
  }, 1000);

}

</script>


</body>
</html>
