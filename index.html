<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #effect {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: yellow;
      font-size: 48px;
      font-weight: bold;
      display: none;
      z-index: 999;
pointer-events: auto;
      animation: pop 0.8s ease;
    }



    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.2); opacity:0; }
      50% { transform: translate(-50%, -50%) scale(1.4); }
      100% { transform: translate(-50%, -50%) scale(1); opacity:1; }
    }


#missionBox{

  position: fixed;

  top: 20px;
  left: 20px;

  background:
    linear-gradient(
      45deg,
      #1e3c72,
      #2a5298
    );

  color: white;

  padding: 14px 24px;

  border-radius: 18px;

  z-index: 999;
pointer-events: auto;

  text-align: left;

  min-width: 220px;

  box-shadow:
    0 0 20px rgba(0,0,0,0.5);

}





#missionTitle{

  font-size: 16px;

}

#missionText{

  font-size: 28px;
  font-weight: bold;

}


#treasureBox{

  position: fixed;

  top: 20px;
  right: 20px;

display: none;

  background:
    linear-gradient(
      45deg,
      #7b5e00,
      #d4af37
    );

  color: white;

  padding: 14px 24px;

  border-radius: 18px;

  z-index: 999;
pointer-events: auto;

  text-align: center;

  min-width: 180px;

  box-shadow:
    0 0 20px rgba(0,0,0,0.5);

}



#treasureTitle{
  font-size:18px;
}

#treasureCount{
  font-size:32px;
  font-weight:bold;
}

#treasureEffect{

  position: fixed;


  bottom: 40px;
  left: 50%;

  transform: translateX(-50%);

  background: gold;

  color: black;

  font-size: 42px;

  font-weight: bold;

  padding: 20px 40px;

  border-radius: 20px;

  display: none;

  z-index: 999;

}

#photoMessage{

  position: fixed;

  bottom: 30px;
  left: 50%;

  transform: translateX(-50%);

  background: rgba(0,0,0,0.8);

  color: white;

  padding: 14px 28px;

  border-radius: 20px;

  font-size: 24px;

  z-index: 999;
pointer-events: auto;

  display: none;

}
#photoMessage{

  cursor: pointer;

  user-select: none;

}
#stampBox{

  position: fixed;

  bottom: 20px;
  left: 20px;

  background: rgba(0,0,0,0.7);

  padding: 16px;

  border-radius: 18px;

  z-index: 999;
pointer-events: auto;

  color: white;

  text-align: center;

}

#stampTitle{

  font-size: 20px;
  margin-bottom: 10px;

}

#stampArea{

  display: flex;
  gap: 10px;

}

#stampArea img{

  width: 70px;
  height: 70px;

  border-radius: 12px;

  background: white;

}

  </style>
</head>

<body>

<div id="effect">発見!!</div>

<div id="treasureEffect">
  宝発見！
</div>

<div id="missionBox" style="display:none;">

  <div id="missionTitle">
    お題
  </div>

  <div id="missionText">
    読み込み待機中
  </div>
</div>
<div id="treasureBox">

  <div id="treasureTitle">
    宝発見数
  </div>

  <div id="treasureCount">
    0 / 1
  </div>



  <img
    id="treasureImage"
    src=""
    style="
      width:120px;
      display:none;
      margin-top:10px;
      border-radius:12px;
    "
  >

</div>

<div id="photoMessage">
  スクリーンショットで撮影してね！
<br>
(タップで閉じる)
</div>

<div id="stampBox" style="display:none;">

  <div id="stampTitle">
    スタンプラリー
  </div>

  <div id="stampArea">

    <img id="stamp1" src="stamp_empty.jpg">
    <img id="stamp2" src="stamp_empty.jpg">
    <img id="stamp3" src="stamp_empty.jpg">

  </div>

</div>

<a-scene
  mindar-image="
    imageTargetSrc: targets.mind;
    maxTrack: 6;
    uiScanning: yes;
    uiLoading: yes;
  "
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

<a-assets>

  <img id="stamp1Img" src="stamp1.jpg" />
  <img id="stamp2Img" src="stamp2.jpg" />
  <img id="stamp3Img" src="stamp3.jpg" />

  <img id="girlImg" src="girl.jpg" />
  <img id="frameImg" src="frame.jpg" />
  <img id="treasureImg" src="treasure.jpg" />

</a-assets>

<a-camera
  camera
  position="0 0 0"
  look-controls="enabled: false">
</a-camera>


<a-entity
  id="target1"
  mindar-image-target="targetIndex: 0">

  <a-plane
    src="#girlImg"
    width="1"
    height="1.5"
    material="shader: flat; transparent: true;">
  </a-plane>

</a-entity>

<a-entity
  id="target2"
  mindar-image-target="targetIndex: 1">

  <a-plane
    src="#frameImg"
    width="2"
    height="2"
    material="shader: flat; transparent: true;">
  </a-plane>

</a-entity>

<a-entity
  id="target3"
  mindar-image-target="targetIndex: 2">



</a-entity>

<a-entity
  id="target4"
  mindar-image-target="targetIndex: 3">



</a-entity>

<a-entity
  id="target5"
  mindar-image-target="targetIndex: 4">



</a-entity>

<a-entity
  id="target6"
  mindar-image-target="targetIndex: 5">

  <a-plane
    src="#treasureImg"
    width="1"
    height="1"
    material="shader: flat; transparent: true;">
  </a-plane>

</a-entity>


</a-scene>




<script>

const effect = document.querySelector("#effect");
const treasureEffect =
document.querySelector("#treasureEffect");
const scene = document.querySelector("a-scene");


const missionText =
document.querySelector("#missionText");

const treasureCount =
document.querySelector("#treasureCount");

const treasureImage =
document.querySelector("#treasureImage");

const missionBox =
document.querySelector("#missionBox");

const treasureBox =
document.querySelector("#treasureBox");

const stampBox =
document.querySelector("#stampBox");

let foundTreasure = 0;
let treasure1Found = false;
const totalTreasure = 1;

scene.addEventListener("arReady", () => {
console.log("AR READY");

  console.log("scene loaded");

  document
  .querySelector("#target5")
  .addEventListener("targetFound", () => {

    console.log("stamp3 found");

    if(!stamp3Get){

      stamp3Get = true;

      document.querySelector("#stamp3").src =
        "stamp3.jpg";

      showStampEffect();

    }

  });

  document
  .querySelector("#target3")
  .addEventListener("targetFound", () => {

    console.log("stamp1 found");

    if(!stamp1Get){

      stamp1Get = true;

      document.querySelector("#stamp1").src =
        "stamp1.jpg";

      showStampEffect();

    }

  });

  document
  .querySelector("#target4")
  .addEventListener("targetFound", () => {

    console.log("stamp2 found");

    if(!stamp2Get){

      stamp2Get = true;

      document.querySelector("#stamp2").src =
        "stamp2.jpg";

      showStampEffect();

    }

  });

  document
  .querySelector("#target1")
  .addEventListener("targetFound", () => {

    console.log("girl found");

    missionBox.style.display =
      "block";

    stampBox.style.display =
      "block";

    treasureBox.style.display =
      "none";

    missionText.innerHTML =
      "女の子を探せ！";

  });

  document
  .querySelector("#target2")
  .addEventListener("targetFound", () => {

    console.log("photo found");

    document.querySelector("#photoMessage")
      .style.display = "block";

  });

  document
  .querySelector("#target2")
  .addEventListener("targetLost", () => {

    document.querySelector("#photoMessage")
      .style.display = "none";

  });

  document
  .querySelector("#target6")
  .addEventListener("targetFound", () => {

    console.log("treasure found");

    treasureBox.style.display =
      "block";

    missionBox.style.display =
      "none";

    if(treasure1Found){

      treasureEffect.innerHTML =
        "発見済みのお宝！";

    }else{

      treasure1Found = true;

      foundTreasure++;

      treasureCount.innerHTML =
        foundTreasure + " / " +
        totalTreasure;

      treasureImage.src =
        "treasure.jpg";

      treasureImage.style.display =
        "block";

      treasureEffect.innerHTML =
        "宝発見！！";

    }

    treasureEffect.style.display =
      "block";

    setTimeout(() => {

      treasureEffect.style.display =
        "none";

    }, 1500);

  });

});


document
.querySelector("#photoMessage")
.addEventListener("click", () => {

  document.querySelector("#photoMessage")
    .style.display = "none";

});

let stamp1Get = false;
let stamp2Get = false;
let stamp3Get = false;


function showStampEffect(){

  effect.innerHTML =
    "スタンプGET!!";

  effect.style.display = "block";

  // 音再生を安全化
  try{

  const audio =
    new Audio("discover.mp3");

  audio.play();

}catch(e){

  console.log(e);

}

  setTimeout(() => {

    effect.style.display = "none";

  }, 1000);

  checkComplete();

}

function checkComplete(){

  if(
    stamp1Get &&
    stamp2Get &&
    stamp3Get &&

  ){

    setTimeout(() => {

      alert("スタンプラリー コンプリート！！");

    }, 300);

  }

}

</script>



</body>
</html>
