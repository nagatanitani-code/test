<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

 <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
 

 <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #effect {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: yellow;
      font-size: 48px;
      font-weight: bold;
      display: none;
opacity:1 !important;
      z-index: 999;
pointer-events: auto;
      animation: pop 0.8s ease;
    }



    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.2); opacity:0; }
      50% { transform: translate(-50%, -50%) scale(1.4); }
      100% { transform: translate(-50%, -50%) scale(1); opacity:1; }
    }



#guideUI{

  position: fixed;

  top: 10px;
  left: 50%;

  transform: translateX(-50%);

  display: none;
  gap: 14px;

  z-index: 999;

}

.guideItem{

  position: relative;

  width: 90px;
  height: 90px;

  border: 4px solid yellow;
  border-radius: 16px;

  overflow: hidden;

  background: black;

}

.guideCrop{

  width: 100%;
  height: 100%;

  background-image:
    url("girl.jpg");

  background-repeat:
    no-repeat;

}



.guideCrop,
.animalGuideCrop{

  width: 100%;
  height: 100%;

  background-repeat: no-repeat;
  background-color: black;
}





.guideCheck{

  position: absolute;

  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  display: none;

}

#animalGuideUI{

  position: fixed;

  top: 120px;
  left: 50%;

  transform: translateX(-50%);

  display: none;
  gap: 14px;

  z-index: 999;

}

.animalGuideCrop{

  width: 100%;
  height: 100%;

  background-image:
    url("animal.jpg");

  background-repeat:
    no-repeat;

}


#missionTitle{

  font-size: 16px;

}

#missionText{

  font-size: 28px;
  font-weight: bold;

}


#treasureBox{

  position: fixed;
display:none;
  top: 20px;
  right: 20px;



  background:
    linear-gradient(
      45deg,
      #7b5e00,
      #d4af37
    );

  color: white;

  padding: 14px 24px;

  border-radius: 18px;

  z-index: 999;
pointer-events: auto;

  text-align: center;

  min-width: 180px;

  box-shadow:
    0 0 20px rgba(0,0,0,0.5);

}



#treasureTitle{
  font-size:18px;
}

#treasureCount{
  font-size:32px;
  font-weight:bold;
}

#treasureEffect{

  position: fixed;
display:none;

  bottom: 40px;
  left: 50%;

  transform: translateX(-50%);

  background: gold;

  color: black;

  font-size: 24px;

  font-weight: bold;

  padding: 12px 24px;

  border-radius: 20px;


  z-index: 999;

}

#photoMessage{

  position: fixed;
display:none;
  bottom: 30px;
  left: 50%;

  transform: translateX(-50%);

  background: rgba(0,0,0,0.8);

  color: white;

  padding: 14px 28px;

  border-radius: 20px;

  font-size: 24px;

  z-index: 999;
pointer-events: auto;



}
#photoMessage{

  cursor: pointer;

  user-select: none;

}
#stampBox{

  position: fixed;

  bottom: 20px;
  left: 20px;

  background: rgba(0,0,0,0.7);

  padding: 16px;

  border-radius: 18px;

  z-index: 999;
pointer-events: auto;

  color: white;

  text-align: center;

}

#stampTitle{

  font-size: 20px;
  margin-bottom: 10px;

}

#stampArea{

  display: flex;
  gap: 10px;

}

#stampArea img{

  width: 70px;
  height: 70px;

  border-radius: 12px;

  background: white;

}
#guideMessage{

  position: fixed;

  top: 140px;
  left: 20px;

  background: rgba(0,0,0,0.7);

  color: #ffff66;

  padding: 12px 20px;

  border-radius: 16px;

  font-size: 24px;
  font-weight: bold;

  z-index: 999;

  display: none;

}


#completeButton{

  background:
    linear-gradient(
      45deg,
      #ffcc00,
      #ff8800
    );

  color: white;

  font-size: 28px;
  font-weight: bold;

  padding: 20px 40px;

  border-radius: 24px;

  box-shadow:
    0 0 30px rgba(255,180,0,0.8);

  cursor: pointer;

  white-space: nowrap;

  position: relative;

  animation:
    buttonFloat 1.2s ease-in-out infinite;

}


#completeWrap{

  position: fixed;

  top: 60%;
  left: 50%;

  transform: translate(-50%, -50%);

  z-index: 9999;

  display: none;

}



#closeComplete{

  position: absolute;

  top: -18px;
  right: -18px;

  width: 48px;
  height: 48px;

  border-radius: 50%;

  background: black;

  color: white;

  font-size: 30px;
  font-weight: bold;

  display: flex;

  align-items: center;
  justify-content: center;

  cursor: pointer;

  z-index: 10000;

}




@keyframes buttonFloat {

  0% {
    transform: translateY(0px);
  }

  50% {
    transform: translateY(-8px);
  }

  100% {
    transform: translateY(0px);
  }

}



  </style>
</head>

<body>


<div id="completeWrap">
  <div id="closeComplete">
    ×
  </div>

  <div id="completeButton">
    この子達の日常をもっとのぞいてみる！
  </div>
</div>



<div id="guideUI">

  <div class="guideItem">
    <div class="guideCrop"
         id="guideCrop_heart"></div>

    <img class="guideCheck"
         id="guideCheck_heart"
         src="check.png">
  </div>

  <div class="guideItem">
    <div class="guideCrop"
         id="guideCrop_eye"></div>

    <img class="guideCheck"
         id="guideCheck_eye"
         src="check.png">
  </div>

  <div class="guideItem">
    <div class="guideCrop"
         id="guideCrop_ribbon"></div>

    <img class="guideCheck"
         id="guideCheck_ribbon"
         src="check.png">
  </div>

</div>

<div id="animalGuideUI">

  <div class="guideItem">
    <div class="animalGuideCrop"
         id="animalGuideCrop_ear"></div>

    <img class="guideCheck"
         id="guideCheck_ear"
         src="check.png">
  </div>

  <div class="guideItem">
    <div class="animalGuideCrop"
         id="animalGuideCrop_nose"></div>

    <img class="guideCheck"
         id="guideCheck_nose"
         src="check.png">
  </div>

  <div class="guideItem">
    <div class="animalGuideCrop"
         id="animalGuideCrop_tail"></div>

    <img class="guideCheck"
         id="guideCheck_tail"
         src="check.png">
  </div>

</div>


<div id="effect">発見!!</div>

<div id="treasureEffect">
  宝発見！
</div>


<div id="treasureBox">

  <div id="treasureTitle">
    宝発見数
  </div>

  <div id="treasureCount">
    0 / 2
  </div>



  <img
    id="treasureImage"
    src=""
    style="
      width:120px;
      margin-top:10px;
      border-radius:12px;
    "
  >

</div>

<div id="photoMessage">
  スクリーンショットで撮影してね！
<br>
(タップで閉じる)
</div>

<div id="stampBox" style="display:none;">

  <div id="stampTitle">
    スタンプラリー
  </div>

  <div id="stampArea">

    <img id="stamp1" src="stamp_empty.jpg">
    <img id="stamp2" src="stamp_empty.jpg">
    <img id="stamp3" src="stamp_empty.jpg">

  </div>

</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;maxTrack: 8;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

<a-assets>

  <img id="stamp1Img" src="stamp1.jpg" />
  <img id="stamp2Img" src="stamp2.jpg" />
  <img id="stamp3Img" src="stamp3.jpg" />
  <img id="animalImg" src="animal.jpg" />

  <img id="girlImg" src="girl.jpg" />
  <img id="frameImg" src="frame.png" />
  <img id="treasureImg" src="treasure.jpg" />

<img id="touchPointImg" src="touch.png" />
<img id="checkImg" src="check.png" />

</a-assets>

<a-camera
  camera
  position="0 0 0"
  look-controls="enabled: false">
</a-camera>


<!-- 5 キノコ フォトフレーム -->
<a-entity
  id="targetMushroom"
  markerhandler
  mindar-image-target="targetIndex: 4">

  <a-plane
    src="#frameImg"
    position="0 1 0"
    width="2"
    height="3"
    material="shader: flat; transparent: true;">
  </a-plane>

</a-entity>


<!-- 3 女の子 絵柄探し -->
<a-entity
  id="targetGirl"
  markerhandler
  mindar-image-target="targetIndex: 2">

  <a-plane
    src="#girlImg"
    width="1.8"
    height="1"
    material="shader: flat; transparent: true;">
  </a-plane>

  <a-entity id="guideContainer"></a-entity>

</a-entity>


<!-- 1 動物 -->
<a-entity
  id="targetAnimal"
  markerhandler
  mindar-image-target="targetIndex: 0">

  <a-plane
    src="#animalImg"
    width="2"
    height="2.5"
    material="shader: flat; transparent: true;">
  </a-plane>
 <a-entity id="animalGuideContainer"></a-entity>

</a-entity>


<!-- 6 スタンプ1 -->
<a-entity
  id="targetStamp1"
  markerhandler
  mindar-image-target="targetIndex: 5">

  <a-plane
    width="0.01"
    height="0.01"
    visible="false">
  </a-plane>

</a-entity>


<!-- 7 スタンプ2 -->
<a-entity
  id="targetStamp2"
  markerhandler
  mindar-image-target="targetIndex: 6">

  <a-plane
    width="0.01"
    height="0.01"
    visible="false">
  </a-plane>

</a-entity>


<!-- 8 スタンプ3 -->
<a-entity
  id="targetStamp3"
  markerhandler
  mindar-image-target="targetIndex: 7">

  <a-plane
    width="0.01"
    height="0.01"
    visible="false">
  </a-plane>

</a-entity>


<!-- 2 コイン はずれ -->
<a-entity
  id="targetCoin"
  markerhandler
  mindar-image-target="targetIndex: 1">

  <a-plane
    width="0.01"
    height="0.01"
    visible="false">
  </a-plane>

</a-entity>


<!-- 4 大当たり -->
<a-entity
  id="targetGold"
  markerhandler
  mindar-image-target="targetIndex: 3">

  <a-plane
    width="0.01"
    height="0.01"
    visible="false">
  </a-plane>

</a-entity>



</a-scene>

<script>

const effect = document.querySelector("#effect");
const treasureEffect =
document.querySelector("#treasureEffect");
const scene = document.querySelector("a-scene");
let currentTargetIndex = 0;
const girlScaleX = 1.8;
const girlScaleY = 1;

const targets = [

{
  id: "heart",
  name: "ハート",
  x: 0.2,
  y: -0.15,
  size: 0.25,
  found: false
},

{
  id: "eye",
  name: "目",
  x: -0.12,
  y: 0.18,
  size: 0.18,
  found: false
},

{
  id: "ribbon",
  name: "リボン",
  x: 0.3,
  y: 0.3,
  size: 0.2,
  found: false
}

];

const animalTargets = [

{
  id: "ear",
  name: "耳",
  x: -0.2,
  y: 0.25,
  size: 0.2,
  found: false
},

{
  id: "nose",
  name: "鼻",
  x: 0.1,
  y: 0.0,
  size: 0.18,
  found: false
},

{
  id: "tail",
  name: "しっぽ",
  x: 0.3,
  y: -0.25,
  size: 0.25,
  found: false
}

];

const animalScaleX = 2;
const animalScaleY = 2.5;


// =======================
// セーブ
// =======================

function saveGame(){

  const saveData = {

    coinFound,
    goldFound,
    foundTreasure,

    stamp1Get,
    stamp2Get,
    stamp3Get,

    solved,

    targets: targets.map(t => ({
      id: t.id,
      found: t.found
    })),

    animalTargets: animalTargets.map(t => ({
      id: t.id,
      found: t.found
    }))

  };

  localStorage.setItem(
    "arGameSave",
    JSON.stringify(saveData)
  );

}



// =======================
// ロード
// =======================

function loadGame(){

  const saveData =
    JSON.parse(
      localStorage.getItem("arGameSave")
    );

  if(!saveData) return;

  coinFound =
    saveData.coinFound || false;

  goldFound =
    saveData.goldFound || false;

  foundTreasure =
    saveData.foundTreasure || 0;

  stamp1Get =
    saveData.stamp1Get || false;

  stamp2Get =
    saveData.stamp2Get || false;

  stamp3Get =
    saveData.stamp3Get || false;

  solved =
    saveData.solved || false;

  treasureCount.innerHTML =
    `${foundTreasure} / ${totalTreasure}`;

  if(stamp1Get){
    document.querySelector("#stamp1").src =
      "stamp1.jpg";
  }

  if(stamp2Get){
    document.querySelector("#stamp2").src =
      "stamp2.jpg";
  }

  if(stamp3Get){
    document.querySelector("#stamp3").src =
      "stamp3.jpg";
  }

  saveData.targets?.forEach(saved => {

    const target =
      targets.find(t => t.id === saved.id);

    if(target){

      target.found = saved.found;

      if(saved.found){

        document.querySelector(
          "#guideCheck_" + target.id
        ).style.display = "block";

      }

    }

  });

  saveData.animalTargets?.forEach(saved => {

    const target =
      animalTargets.find(t => t.id === saved.id);

    if(target){

      target.found = saved.found;

      if(saved.found){

        document.querySelector(
          "#guideCheck_" + target.id
        ).style.display = "block";

      }

    }

  });

}



// 今使うターゲット


function handleTouch(event){

  const camera = document.querySelector("[camera]");
  if(!camera) return;

  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  const x = event.touches ? event.touches[0].clientX : event.clientX;
  const y = event.touches ? event.touches[0].clientY : event.clientY;

  mouse.x = (x / window.innerWidth) * 2 - 1;
  mouse.y = -(y / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera.getObject3D("camera"));

  const clickables = document.querySelectorAll(".clickable");

  const objects = [];

  clickables.forEach(el => {
    if (el.object3D && el.object3D.visible) {
      const mesh = el.getObject3D("mesh");
      if (mesh) objects.push(mesh);
    }
  });

  const intersects = raycaster.intersectObjects(objects, true);

  if (intersects.length === 0) return;

  const hitEl =
    intersects[0].object.el ||
    intersects[0].object.parent?.el;

  if (!hitEl) return;

const target =
  targets.find(t => t.id === hitEl.id) ||
  animalTargets.find(t => t.id === hitEl.id);


  if (!target || target.found) return;

  target.found = true;
saveGame();

  // UI
  effect.innerHTML = target.name + " 発見!!";
  effect.style.display = "block";

  const checkUI = document.querySelector("#guideCheck_" + target.id);
  if (checkUI) checkUI.style.display = "block";

  setTimeout(() => effect.style.display = "none", 1000);

  // 3Dチェック表示
  const check = document.createElement("a-plane");
  check.setAttribute("src", "#checkImg");
 const isAnimal =
  animalTargets.find(t => t.id === target.id);

const posX =
  isAnimal
  ? target.x * animalScaleX
  : target.x * girlScaleX;

const posY =
  isAnimal
  ? target.y * animalScaleY
  : target.y * girlScaleY;

check.setAttribute(
  "position",
  `${posX} ${posY} 0.08`
);


const checkSize = target.size * 1.6;

check.setAttribute("width", checkSize);
check.setAttribute("height", checkSize);

  check.setAttribute("material", "shader: flat; transparent: true");

const parentContainer =
  animalTargets.find(t => t.id === target.id)
  ? "#animalGuideContainer"
  : "#guideContainer";

document.querySelector(parentContainer)
  .appendChild(check);
}


const treasureCount =
document.querySelector("#treasureCount");

const treasureImage =
document.querySelector("#treasureImage");

const treasureBox =
document.querySelector("#treasureBox");

const stampBox =
document.querySelector("#stampBox");

let foundTreasure = 0;
let coinFound = false; 
let goldFound = false;
const totalTreasure = 2;

let stamp1Get = false;
let stamp2Get = false;
let stamp3Get = false;
let solved = false;

AFRAME.registerComponent("markerhandler", {

  init: function () {

    this.el.addEventListener("targetFound", () => {


const guideUI = document.querySelector("#guideUI");

const effect = document.querySelector("#effect");

effect.style.display = "none";
treasureEffect.style.display = "none";

document.querySelector("#completeWrap")
  .style.display = "none";


document.querySelector("#photoMessage")
  .style.display = "none";

guideUI.style.display = "none";




if(this.el.id === "targetCoin"){

  treasureBox.style.display = "block";

  treasureImage.src = "coin.jpg";

  if(!coinFound){

    coinFound = true;
saveGame();

    foundTreasure++;

    treasureCount.innerHTML =
      `${foundTreasure} / ${totalTreasure}`;

    treasureEffect.innerHTML =
      "はずれのお宝！";

  } else {

    treasureEffect.innerHTML =
      "発見済みのお宝！";
setTimeout(() => { treasureEffect.style.display = "none"; }, 1500);
  }

  treasureEffect.style.display = "block";

}




if(this.el.id === "targetStamp1"){

  stampBox.style.display = "block";

  if(!stamp1Get){

    stamp1Get = true;
saveGame();

    document.querySelector("#stamp1").src =
      "stamp1.jpg";

    showStampEffect("スタンプGET!!");

  } else {

    showStampEffect("スタンプ1 発見済み！");
  }

}

if(this.el.id === "targetStamp2"){

  stampBox.style.display = "block";

  if(!stamp2Get){

    stamp2Get = true;
saveGame();

    document.querySelector("#stamp2").src =
      "stamp2.jpg";

    showStampEffect("スタンプGET!!");

  } else {

    showStampEffect("スタンプ2 発見済み！");
  }

}

if(this.el.id === "targetStamp3"){

  stampBox.style.display = "block";

  if(!stamp3Get){

    stamp3Get = true;
saveGame();

    document.querySelector("#stamp3").src =
      "stamp3.jpg";

    showStampEffect("スタンプGET!!");

  } else {

    showStampEffect("スタンプ3 発見済み！");
  }

}



if(this.el.id === "targetGold"){

  treasureBox.style.display = "block";

  treasureImage.src = "gold.jpg";

  if(!goldFound){

    goldFound = true;
saveGame();

    foundTreasure++;

    treasureCount.innerHTML =
      `${foundTreasure} / ${totalTreasure}`;

    treasureEffect.innerHTML =
      "大当たり！！";

  } else {

    treasureEffect.innerHTML =
      "発見済みの大当たり！";

  }

  treasureEffect.style.display = "block";
setTimeout(() => { treasureEffect.style.display = "none"; }, 1500);


}



if(this.el.id === "targetGirl"){

  guideUI.style.display = "flex";

}


if(this.el.id === "targetAnimal"){
  document.querySelector("#animalGuideUI")
    .style.display = "flex";
}


if(this.el.id === "targetMushroom"){

  document.querySelector("#photoMessage")
    .style.display = "block";

}
  
if( this.el.id !== "targetStamp1" && this.el.id !== "targetStamp2" && this.el.id !== "targetStamp3" )
{ stampBox.style.display = "none"; 
}
    
    });

    this.el.addEventListener("targetLost", () => {

if(this.el.id === "targetAnimal"){

  document.querySelector("#animalGuideUI")
    .style.display = "none";

}

if(this.el.id === "targetGirl"){
  guideUI.style.display = "none";
}

if(this.el.id === "targetMushroom"){

  document.querySelector("#photoMessage")
    .style.display = "none";


}

if(
  this.el.id === "targetCoin" ||
  this.el.id === "targetGold"
){

  treasureBox.style.display = "none";
treasureEffect.style.display = "none";

}


    });

  }

});





document
.querySelector("#photoMessage")
.addEventListener("touchstart", () => {

  document.querySelector("#photoMessage")
    .style.display = "none";

});




function showStampEffect(message){

 stampBox.style.display = "block";
  effect.style.display = "none";

  void effect.offsetWidth;

  effect.innerHTML = message;

  effect.style.display = "block";

  setTimeout(() => {

    effect.style.display = "none";


  }, 1000);

  checkComplete();

}
function checkComplete(){

  if(
    stamp1Get &&
    stamp2Get &&
    stamp3Get
  ){

    effect.style.display = "none";

    void effect.offsetWidth;

    effect.innerHTML =
      "コンプリート！！";

    effect.style.display = "block";

    setTimeout(() => {

      effect.style.display = "none";


document.querySelector("#completeWrap")
  .style.display = "block";



    }, 2000);

  }

}
document.addEventListener(
  "touchstart",
  handleTouch
);

document.addEventListener(
  "click",
  handleTouch
);

function createTargets(){

  const container =
    document.querySelector("#guideContainer");

  targets.forEach(target => {

    // =====================
    // 判定
    // =====================

    const touch =
      document.createElement("a-plane");

    touch.setAttribute(
      "class",
      "clickable"
    );

    touch.setAttribute(
      "id",
      target.id
    );

touch.setAttribute(
  "position",
  `
  ${target.x * girlScaleX}
  ${target.y * girlScaleY}
  0.01
  `
);

const hitSize = target.size * 1.6;

touch.setAttribute(
  "width",
  hitSize
);

touch.setAttribute(
  "height",
  hitSize
);



    touch.setAttribute(
      "material",
      "opacity: 0"
    );

    container.appendChild(touch);

    // =====================
    // ガイド背景
    // =====================

    
    // =====================

  const zoom =
