<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

 <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
 

 <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #effect {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: yellow;
      font-size: 48px;
      font-weight: bold;
      display: none;
opacity:1 !important;
      z-index: 999;
pointer-events: auto;
      animation: pop 0.8s ease;
    }



    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.2); opacity:0; }
      50% { transform: translate(-50%, -50%) scale(1.4); }
      100% { transform: translate(-50%, -50%) scale(1); opacity:1; }
    }


#missionBox{

  position: fixed;

  top: 20px;
  left: 20px;

  background:
    linear-gradient(
      45deg,
      #1e3c72,
      #2a5298
    );

  color: white;

  padding: 14px 24px;

  border-radius: 18px;

  z-index: 999;
pointer-events: auto;

  text-align: left;

  min-width: 220px;

  box-shadow:
    0 0 20px rgba(0,0,0,0.5);

}





#missionTitle{

  font-size: 16px;

}

#missionText{

  font-size: 28px;
  font-weight: bold;

}


#treasureBox{

  position: fixed;
display:none;
  top: 20px;
  right: 20px;



  background:
    linear-gradient(
      45deg,
      #7b5e00,
      #d4af37
    );

  color: white;

  padding: 14px 24px;

  border-radius: 18px;

  z-index: 999;
pointer-events: auto;

  text-align: center;

  min-width: 180px;

  box-shadow:
    0 0 20px rgba(0,0,0,0.5);

}



#treasureTitle{
  font-size:18px;
}

#treasureCount{
  font-size:32px;
  font-weight:bold;
}

#treasureEffect{

  position: fixed;
display:none;

  bottom: 40px;
  left: 50%;

  transform: translateX(-50%);

  background: gold;

  color: black;

  font-size: 42px;

  font-weight: bold;

  padding: 20px 40px;

  border-radius: 20px;


  z-index: 999;

}

#photoMessage{

  position: fixed;
display:none;
  bottom: 30px;
  left: 50%;

  transform: translateX(-50%);

  background: rgba(0,0,0,0.8);

  color: white;

  padding: 14px 28px;

  border-radius: 20px;

  font-size: 24px;

  z-index: 999;
pointer-events: auto;



}
#photoMessage{

  cursor: pointer;

  user-select: none;

}
#stampBox{

  position: fixed;

  bottom: 20px;
  left: 20px;

  background: rgba(0,0,0,0.7);

  padding: 16px;

  border-radius: 18px;

  z-index: 999;
pointer-events: auto;

  color: white;

  text-align: center;

}

#stampTitle{

  font-size: 20px;
  margin-bottom: 10px;

}

#stampArea{

  display: flex;
  gap: 10px;

}

#stampArea img{

  width: 70px;
  height: 70px;

  border-radius: 12px;

  background: white;

}
#guideMessage{

  position: fixed;

  top: 140px;
  left: 20px;

  background: rgba(0,0,0,0.7);

  color: #ffff66;

  padding: 12px 20px;

  border-radius: 16px;

  font-size: 24px;
  font-weight: bold;

  z-index: 999;

  display: none;

}


  </style>
</head>

<body>

<div id="effect">発見!!</div>

<div id="treasureEffect">
  宝発見！
</div>

<div id="guideMessage">
  この部分を見つけてタップ！
</div>

<div id="missionBox" style="display:none;">

  <div id="missionTitle">
    お題
  </div>

  <div id="missionText">
    読み込み待機中
  </div>
</div>
<div id="treasureBox">

  <div id="treasureTitle">
    宝発見数
  </div>

  <div id="treasureCount">
    0 / 1
  </div>



  <img
    id="treasureImage"
    src=""
    style="
      width:120px;
      margin-top:10px;
      border-radius:12px;
    "
  >

</div>

<div id="photoMessage">
  スクリーンショットで撮影してね！
<br>
(タップで閉じる)
</div>

<div id="stampBox" style="display:none;">

  <div id="stampTitle">
    スタンプラリー
  </div>

  <div id="stampArea">

    <img id="stamp1" src="stamp_empty.jpg">
    <img id="stamp2" src="stamp_empty.jpg">
    <img id="stamp3" src="stamp_empty.jpg">

  </div>

</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;maxTrack: 6;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

<a-assets>

  <img id="stamp1Img" src="stamp1.jpg" />
  <img id="stamp2Img" src="stamp2.jpg" />
  <img id="stamp3Img" src="stamp3.jpg" />


  <img id="girlImg" src="girl.jpg" />
  <img id="frameImg" src="frame.jpg" />
  <img id="treasureImg" src="treasure.jpg" />

<img id="touchPointImg" src="touch.png" />
<img id="checkImg" src="check.png" />

</a-assets>

<a-camera
  camera
  position="0 0 0"
  look-controls="enabled: false">
</a-camera>


<a-entity
  id="target4"
  markerhandler
  mindar-image-target="targetIndex: 3">

  <!-- 女の子 -->
  <a-plane
  src="#girlImg"
  width="1"
  height="1"
  material="shader: flat; transparent: true;">
</a-plane>

  <!-- 判定ポイント（ここが核心） -->
  <a-plane
    id="touchTarget"
    class="clickable"
    data-name="ハート"
    width="0.25"
    height="0.25"
    position="0.2 -0.15 0.01"
    material="opacity: 0">
  </a-plane>

  <!-- チェック -->
<a-plane
  id="checkMark"

  width="0.25"
  height="0.25"

  position="0.2 -0.15 0.01"

  visible="false"

  material="
    src: #checkImg;
    shader: flat;
    transparent: true;
    alphaTest: 0.01;
    side: double;
    depthTest: false;
  ">
</a-plane>

<!-- ガイド切り抜き -->
<a-plane
  id="guideCrop"
  width="0.3"
  height="0.3"
  position="-0.8 0.6 0.02"
  material="
    src: #girlImg;
    shader: flat;
    transparent: true;
  ">
</a-plane>

<!-- ガイド背景 -->
<a-plane
  id="guideBack"

  width="0.42"
  height="0.42"

  position="-0.8 0.6 0.018"

  material="
    color: black;
    opacity: 0.45;
    shader: flat;
  ">
</a-plane>

<!-- ガイド枠 -->
<a-plane
  id="guideFrame"

  width="0.34"
  height="0.34"

  position="-0.8 0.6 0.019"

  material="
    color: yellow;
    opacity: 0.25;
    shader: flat;
  "

  animation="
    property: scale;
    from: 1 1 1;
    to: 1.15 1.15 1;
    dir: alternate;
    dur: 700;
    loop: true;
  ">
</a-plane>


</a-entity>

<a-entity
  id="target5"
markerhandler
  mindar-image-target="targetIndex: 4">

  <a-plane
    src="#frameImg"
    width="2"
    height="2"
    material="shader: flat; transparent: true;">
  </a-plane>

</a-entity>

<a-entity
  id="target2"
markerhandler
  mindar-image-target="targetIndex: 1">
<a-plane
    width="0.01"
    height="0.01"
    visible="false">
</a-plane>


</a-entity>

<a-entity
  id="target3"
markerhandler
  mindar-image-target="targetIndex: 2">
<a-plane
    width="0.01"
    height="0.01"
    visible="false">
</a-plane>

</a-entity>

<a-entity
  id="target1"
markerhandler
  mindar-image-target="targetIndex: 0">
<a-plane
    width="0.01"
    height="0.01"
    visible="false">
</a-plane>


</a-entity>

<a-entity
  id="target6"
markerhandler
  mindar-image-target="targetIndex: 5">

  <a-plane
    src="#treasureImg"
    width="1"
    height="1"
    material="shader: flat; transparent: true;">
  </a-plane>

</a-entity>


</a-scene>

<script>

const effect = document.querySelector("#effect");
const treasureEffect =
document.querySelector("#treasureEffect");
const scene = document.querySelector("a-scene");
let currentTargetIndex = 0;
const targets = [

{
  name: "ハート",
  x: 0.2,
  y: -0.15,
  size: 0.25,
  found: false
},

{
  name: "目",
  x: -0.12,
  y: 0.18,
  size: 0.18,
  found: false
},

{
  name: "リボン",
  x: 0.3,
  y: 0.3,
  size: 0.2,
  found: false
}

];
function getCurrentTarget(){
  return targets[currentTargetIndex];
}
// 今使うターゲット
const targetData = getCurrentTarget();

document.querySelector("#guideFrame")
  .setAttribute("visible", true);


function handleTouch(event){

  console.log("タッチ検出");

  // camera取得
  const camera = document.querySelector("[camera]");

  if(!camera){
    console.log("camera取得失敗");
    return;
  }

  // raycaster
  const raycaster = new THREE.Raycaster();

  // 座標
  const mouse = new THREE.Vector2();

  // タッチ位置
  const x = event.touches ?
    event.touches[0].clientX :
    event.clientX;

  const y = event.touches ?
    event.touches[0].clientY :
    event.clientY;

  // -1〜1変換
  mouse.x = (x / window.innerWidth) * 2 - 1;
  mouse.y = -(y / window.innerHeight) * 2 + 1;

  // ray発射
  raycaster.setFromCamera(
    mouse,
    camera.getObject3D("camera")
  );

  // clickable取得
  const clickable =
    document.querySelectorAll(".clickable");

  const objects = [];

  clickable.forEach(el => {

  if(el.object3D.visible){

    const mesh = el.getObject3D("mesh");

    if(mesh){
      objects.push(mesh);
    }

  }

});

  console.log(objects);

  // 判定
  const intersects =
    raycaster.intersectObjects(objects, true);

  console.log(intersects);

  // 当たった
if (intersects.length > 0) {

  const hit = intersects[0].object.el;

  if (hit.id === "touchTarget" && !solved) {

    targets[currentTargetIndex].found = true;

currentTargetIndex++;

if(currentTargetIndex >= targets.length){

  effect.innerHTML = "完全クリア!!";

  document.querySelector("#touchTarget")
    .setAttribute("visible", false);

}else{

  updateGuide();

}

 document.querySelector("#touchTarget")
  .setAttribute(
    "position",
    `${targetData.x} ${targetData.y} 0.01`
  );

    document.querySelector("#checkMark")
  .setAttribute(
    "position",
    `${targetData.x} ${targetData.y} 0.01`
  );
document.querySelector("#guideFrame")
  .setAttribute("visible", false);

document.querySelector("#guideBack")
  .setAttribute("visible", false);

document.querySelector("#guideFrame")
  .setAttribute(
    "material",
    "color: lime; opacity: 0.4;"
  );

document.querySelector("#guideMessage")
  .style.display = "none";

// チェック表示
document.querySelector("#checkMark")
  .setAttribute("visible", true);

// 判定を消す
document.querySelector("#touchTarget")
  .setAttribute("visible", false);

updateGuide();

    effect.innerHTML = "発見!!";
    effect.style.display = "block";

    setTimeout(() => {
      effect.style.display = "none";
    }, 1000);
  }
}

// ← これを追加！！！！！
}

const missionText =
document.querySelector("#missionText");

const treasureCount =
document.querySelector("#treasureCount");

const treasureImage =
document.querySelector("#treasureImage");

const missionBox =
document.querySelector("#missionBox");

const treasureBox =
document.querySelector("#treasureBox");

const stampBox =
document.querySelector("#stampBox");

let foundTreasure = 0;
let treasure1Found = false;
const totalTreasure = 1;

let stamp1Get = false;
let stamp2Get = false;
let stamp3Get = false;
let solved = false;

AFRAME.registerComponent("markerhandler", {

  init: function () {

    this.el.addEventListener("targetFound", () => {

      console.log(this.el.id + " found");


if(this.el.id === "target4"){


  if(!solved){

    document.querySelector("#guideMessage")
  .style.display = "block";

  // 判定位置
document.querySelector("#touchTarget")
  .setAttribute(
    "position",
    `${targetData.x} ${targetData.y} 0.01`
  );

// チェック位置
document.querySelector("#checkMark")
  .setAttribute(
    "position",
    `${targetData.x} ${targetData.y} 0.01`
  );


setTimeout(() => {

  const guideCrop =
    document.querySelector("#guideCrop");

  const mesh =
    guideCrop.getObject3D("mesh");

  if(mesh){

    const material = mesh.material;

    material.map =
      new THREE.TextureLoader()
      .load("girl.jpg", () => {

        material.map.repeat.set(
          targetData.size,
          targetData.size
        );

        // X
        const offsetX =
          (targetData.x + 0.5)
          - targetData.size / 2;

        // Y（超重要）
        const offsetY =
  (targetData.y + 0.5)
  - targetData.size / 2;

        material.map.offset.set(
          offsetX,
          offsetY
        );

        // これ超重要
        

        material.map.needsUpdate = true;

      });

  }

}, 0);

// ←ここ重要！！
  }

  missionBox.style.display = "block";

  stampBox.style.display = "none";

  treasureBox.style.display = "none";

  missionText.innerHTML =
    "女の子を探せ！";

}else{

  document.querySelector("#guideFrame")
  .setAttribute(
    "material",
    "color: lime; opacity: 0.4;"
  );

  document.querySelector("#guideFrame")
    .setAttribute("visible", false);

  document.querySelector("#guideBack")
    .setAttribute("visible", false);

  document.querySelector("#guideMessage")
    .style.display = "none";

  document.querySelector("#checkMark")
    .setAttribute("visible", true);

  document.querySelector("#touchTarget")
    .setAttribute("visible", false);

}

if(this.el.id === "target1"){

}
if(this.el.id === "target2"){
stampBox.style.display = "block";
missionBox.style.display =
    "none";
 treasureBox.style.display = "none";
}
if(this.el.id === "target3"){
stampBox.style.display = "block";
missionBox.style.display =
    "none";
 treasureBox.style.display = "none";
}
// target6
if(this.el.id === "target6"){

  treasureBox.style.display =
    "block";

stampBox.style.display = "none";

  missionBox.style.display =
    "none";

  if(treasure1Found){

    treasureEffect.innerHTML =
      "発見済みのお宝！";

  }else{

    treasure1Found = true;

    foundTreasure++;

    treasureCount.innerHTML =
      foundTreasure + " / " +
      totalTreasure;

    treasureImage.src =
      "treasure.jpg";

    treasureEffect.innerHTML =
      "宝発見！！";

  }

  treasureEffect.style.display =
    "block";

  setTimeout(() => {

    treasureEffect.style.display =
      "none";

  }, 1500);

}
      // target3
      if(this.el.id === "target2"){

        if(!stamp1Get){

          stamp1Get = true;

          document.querySelector("#stamp1").src =
            "stamp1.jpg";

          showStampEffect();
stampBox.style.display = "block";
missionBox.style.display =
    "none";
 treasureBox.style.display = "none";

        }

      }

      
      if(this.el.id === "target3"){

        if(!stamp2Get){

          stamp2Get = true;

          document.querySelector("#stamp2").src =
            "stamp2.jpg";

          showStampEffect();
stampBox.style.display = "block";
missionBox.style.display =
    "none";
 treasureBox.style.display = "none";

        }

      }

    
      if(this.el.id === "target1"){

        if(!stamp3Get){

          stamp3Get = true;

          document.querySelector("#stamp3").src =
            "stamp3.jpg";

          showStampEffect();
stampBox.style.display = "block";
missionBox.style.display =
    "none";
 treasureBox.style.display = "none";

        }

      }

    
      if(this.el.id === "target5"){

        document.querySelector("#photoMessage")
          .style.display = "block";
stampBox.style.display = "none";
missionBox.style.display =
    "none";
 treasureBox.style.display = "none";


      }

    });

    this.el.addEventListener("targetLost", () => {

      if(this.el.id === "target5"){

        document.querySelector("#photoMessage")
          .style.display = "none";

      }
// target6
if(this.el.id === "target6"){
stampBox.style.display = "block";
missionBox.style.display =
    "none";
  treasureBox.style.display =
    "none";

}

    });

  }

});





document
.querySelector("#photoMessage")
.addEventListener("touchstart", () => {

  document.querySelector("#photoMessage")
    .style.display = "none";

});




function showStampEffect(){

  effect.style.display = "none";

  void effect.offsetWidth;

  effect.innerHTML =
    "スタンプGET!!";

  effect.style.display = "block";

  setTimeout(() => {

    effect.style.display = "none";

  }, 1000);

  checkComplete();

}
function checkComplete(){

  if(
    stamp1Get &&
    stamp2Get &&
    stamp3Get
  ){

    effect.style.display = "none";

    void effect.offsetWidth;

    effect.innerHTML =
      "コンプリート！！";

    effect.style.display = "block";

    setTimeout(() => {

      effect.style.display = "none";

    }, 2000);

  }

}
document.addEventListener(
  "touchstart",
  handleTouch
);

document.addEventListener(
  "click",
  handleTouch
);
function updateGuide(){

  const targetData =
    getCurrentTarget();

  if(!targetData) return;

  // 判定位置
  document.querySelector("#touchTarget")
    .setAttribute(
      "position",
      `${targetData.x} ${targetData.y} 0.01`
    );

  // チェック位置
  document.querySelector("#checkMark")
    .setAttribute(
      "position",
      `${targetData.x} ${targetData.y} 0.01`
    );

  const guideCrop =
    document.querySelector("#guideCrop");

  const mesh =
    guideCrop.getObject3D("mesh");

  if(mesh){

    const material = mesh.material;

    material.map.repeat.set(
      targetData.size,
      targetData.size
    );

    const offsetX =
      (targetData.x + 0.5)
      - targetData.size / 2;

    const offsetY =
      (targetData.y + 0.5)
      - targetData.size / 2;

    material.map.offset.set(
      offsetX,
      offsetY
    );

    material.map.needsUpdate = true;
  }

}

</script>


</body>
</html>
