<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #effect {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: yellow;
      font-size: 48px;
      font-weight: bold;
      display: none;
      z-index: 999;
      animation: pop 0.8s ease;
    }



    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.2); opacity:0; }
      50% { transform: translate(-50%, -50%) scale(1.4); }
      100% { transform: translate(-50%, -50%) scale(1); opacity:1; }
    }


#missionBox{

  position: fixed;

  top: 20px;
  left: 20px;

  background:
    linear-gradient(
      45deg,
      #1e3c72,
      #2a5298
    );

  color: white;

  padding: 14px 24px;

  border-radius: 18px;

  z-index: 999;

  text-align: left;

  min-width: 220px;

  box-shadow:
    0 0 20px rgba(0,0,0,0.5);

}





#missionTitle{

  font-size: 16px;

}

#missionText{

  font-size: 28px;
  font-weight: bold;

}


#treasureBox{

  position: fixed;

  top: 20px;
  right: 20px;

display: none;

  background:
    linear-gradient(
      45deg,
      #7b5e00,
      #d4af37
    );

  color: white;

  padding: 14px 24px;

  border-radius: 18px;

  z-index: 999;

  text-align: center;

  min-width: 180px;

  box-shadow:
    0 0 20px rgba(0,0,0,0.5);

}



#treasureTitle{
  font-size:18px;
}

#treasureCount{
  font-size:32px;
  font-weight:bold;
}

#treasureEffect{

  position: fixed;


  bottom: 40px;
  left: 50%;

  transform: translateX(-50%);

  background: gold;

  color: black;

  font-size: 42px;

  font-weight: bold;

  padding: 20px 40px;

  border-radius: 20px;

  display: none;

  z-index: 999;

}

#photoMessage{

  position: fixed;

  bottom: 30px;
  left: 50%;

  transform: translateX(-50%);

  background: rgba(0,0,0,0.8);

  color: white;

  padding: 14px 28px;

  border-radius: 20px;

  font-size: 24px;

  z-index: 999;

  display: none;

}
#photoMessage{

  cursor: pointer;

  user-select: none;

}
#stampBox{

  position: fixed;

  bottom: 20px;
  right: 20px;

  background: rgba(0,0,0,0.7);

  padding: 16px;

  border-radius: 18px;

  z-index: 999;

  color: white;

  text-align: center;

}

#stampTitle{

  font-size: 20px;
  margin-bottom: 10px;

}

#stampArea{

  display: flex;
  gap: 10px;

}

#stampArea img{

  width: 70px;
  height: 70px;

  border-radius: 12px;

  background: white;

}

  </style>
</head>

<body>

<div id="effect">発見!!</div>

<div id="treasureEffect">
  宝発見！
</div>

<div id="missionBox">

  <div id="missionTitle">
    お題
  </div>

  <div id="missionText">
    読み込み待機中
  </div>
</div>
<div id="treasureBox">

  <div id="treasureTitle">
    宝発見数
  </div>

  <div id="treasureCount">
    0 / 1
  </div>



  <img
    id="treasureImage"
    src=""
    style="
      width:120px;
      display:none;
      margin-top:10px;
      border-radius:12px;
    "
  >

</div>

<div id="photoMessage">
  スクリーンショットで撮影してね！
<br>
(タップで閉じる)
</div>

<div id="stampBox">

  <div id="stampTitle">
    スタンプラリー
  </div>

  <div id="stampArea">

    <img id="stamp1" src="stamp_empty.jpg">
    <img id="stamp2" src="stamp_empty.jpg">
    <img id="stamp3" src="stamp_empty.jpg">
    <img id="stamp4" src="stamp_empty.jpg">

  </div>

</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; maxTrack: 7;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

<a-assets>

 <img id="stamp3Img" src="stamp3.jpg" />
 <img id="stamp1Img" src="stamp1.jpg" />
 <img id="stamp2Img" src="stamp2.jpg" />

 <img id="girlImg" src="ar-image2.jpg" />
 <img id="frameImg" src="frame.jpg" />
 <img id="treasureImg" src="treasure.jpg" />

</a-assets>

<a-camera
  camera
  position="0 0 0"
  look-controls="enabled: false">
</a-camera>

  <!-- 画像1 -->
<!-- target1 スタンプ3 -->
<a-entity
  id="target1"
  mindar-image-target="targetIndex: 0">

  <a-plane
    src="#stamp3Img"
    width="1"
    height="1">
  </a-plane>

</a-entity>


<!-- target2 スタンプ1 -->
<a-entity
  id="target2"
  mindar-image-target="targetIndex: 1">

  <a-plane
    src="#stamp1Img"
    width="1"
    height="1">
  </a-plane>

</a-entity>


<!-- target3 スタンプ2 -->
<a-entity
  id="target3"
  mindar-image-target="targetIndex: 2">

  <a-plane
    src="#stamp2Img"
    width="1"
    height="1">
  </a-plane>

</a-entity>


<!-- target4 女の子 -->
<a-entity
  id="target4"
  mindar-image-target="targetIndex: 3">

  <a-plane
    src="#girlImg"
    width="1"
    height="1.5"
    material="transparent:true">
  </a-plane>

</a-entity>


<!-- target5 フレーム -->
<a-entity
  id="target5"
  mindar-image-target="targetIndex: 4">

  <a-plane
    src="#frameImg"
    width="2"
    height="2"
    material="transparent:true">
  </a-plane>

</a-entity>


<!-- target6 お宝 -->
<a-entity
  id="target6"
  mindar-image-target="targetIndex: 5">

  <a-plane
    src="#treasureImg"
    width="1"
    height="1">
  </a-plane>

</a-entity>


<!-- target7 スタンプ無し -->
<a-entity
  id="target7"
  mindar-image-target="targetIndex: 6">

</a-entity>

</a-scene>




<script>

const effect = document.querySelector("#effect");
const treasureEffect =
document.querySelector("#treasureEffect");
const scene = document.querySelector("a-scene");

scene.addEventListener("loaded", () => {

  // スマホタップ
  window.addEventListener("touchstart", handleTouch);

  // PCクリック
  window.addEventListener("click", handleTouch);

});



function handleTouch(event){

  console.log("タッチ検出");

  // camera取得
  const camera = document.querySelector("[camera]");

  if(!camera){
    console.log("camera取得失敗");
    return;
  }

  // raycaster
  const raycaster = new THREE.Raycaster();

  // 座標
  const mouse = new THREE.Vector2();

  // タッチ位置
  const x = event.touches ?
    event.touches[0].clientX :
    event.clientX;

  const y = event.touches ?
    event.touches[0].clientY :
    event.clientY;

  // -1〜1変換
  mouse.x = (x / window.innerWidth) * 2 - 1;
  mouse.y = -(y / window.innerHeight) * 2 + 1;

  // ray発射
  raycaster.setFromCamera(
    mouse,
    camera.getObject3D("camera")
  );

  // clickable取得
  const clickable =
    document.querySelectorAll(".clickable");

  const objects = [];

  clickable.forEach(el => {

    if(el.object3D.visible){
      objects.push(el.object3D);
    }

  });

  console.log(objects);

  // 判定
  const intersects =
    raycaster.intersectObjects(objects, true);

  console.log(intersects);

  // 当たった
if(intersects.length > 0){
const foundName =
intersects[0].object.el.dataset.name;

effect.innerHTML =
  foundName + " 発見!!";

intersects[0].object.visible = false;

effect.style.display = "block";

const audio = new Audio("discover.mp3");
audio.play();

setTimeout(() => {
  effect.style.display = "none";
}, 1000);
}


}

const missionText =
document.querySelector("#missionText");

const treasureCount =
document.querySelector("#treasureCount");

const treasureImage =
document.querySelector("#treasureImage");

const missionBox =
document.querySelector("#missionBox");

const treasureBox =
document.querySelector("#treasureBox");

let foundTreasure = 0;
let treasure1Found = false;
const totalTreasure = 1;

document
.querySelector("#target1")
.addEventListener("targetFound", () => {

  if(!stamp3Get){

    stamp3Get = true;

    document.querySelector("#stamp3").src =
      "stamp3.jpg";

    showStampEffect();

  }

});



document
.querySelector("#target2")
.addEventListener("targetFound", () => {

  if(!stamp1Get){

    stamp1Get = true;

    document.querySelector("#stamp1").src =
      "stamp1.jpg";

    showStampEffect();

  }

});

document
.querySelector("#target3")
.addEventListener("targetFound", () => {

  // スタンプ
  if(!stamp2Get){

    stamp2Get = true;

    document.querySelector("#stamp2").src =
      "stamp2.jpg";

    showStampEffect();

  }

});
document
.querySelector("#target4")
.addEventListener("targetFound", () => {

  missionBox.style.display =
    "block";

  treasureBox.style.display =
    "none";

  missionText.innerHTML =
    "女の子を探せ！";

});

document
.querySelector("#target5")
.addEventListener("targetFound", () => {

  missionBox.style.display =
    "none";

  treasureBox.style.display =
    "none";

  document.querySelector("#photoMessage")
    .style.display = "block";

});

document
.querySelector("#target5")
.addEventListener("targetLost", () => {

  document.querySelector("#photoMessage")
    .style.display = "none";

});

document
.querySelector("#target6")
.addEventListener("targetFound", () => {

  treasureBox.style.display =
    "block";

  missionBox.style.display =
    "none";

  if(treasure1Found){

    treasureEffect.innerHTML =
      "発見済みのお宝！";

  }else{

    treasure1Found = true;

    foundTreasure++;

    treasureCount.innerHTML =
      foundTreasure + " / " +
      totalTreasure;

    treasureImage.src =
      "treasure.jpg";

    treasureImage.style.display =
      "block";

    treasureEffect.innerHTML =
      "宝発見！！";

  }

  treasureEffect.style.display =
    "block";

  setTimeout(() => {

    treasureEffect.style.display =
      "none";

  }, 1500);

});



document
.querySelector("#target7")
.addEventListener("targetFound", () => {

  if(!stamp4Get){

    stamp4Get = true;

    document.querySelector("#stamp4").src =
      "stamp_empty.jpg";

    showStampEffect();

  }

});



document
.querySelector("#photoMessage")
.addEventListener("click", () => {

  document.querySelector("#photoMessage")
    .style.display = "none";

});

let stamp1Get = false;
let stamp2Get = false;
let stamp3Get = false;
let stamp4Get = false;

function showStampEffect(){

  effect.innerHTML =
    "スタンプGET!!";

  effect.style.display = "block";

  const audio =
    new Audio("discover.mp3");

  audio.play();

  setTimeout(() => {

    effect.style.display = "none";

  }, 1000);

  checkComplete();

}

function checkComplete(){

  if(
    stamp1Get &&
    stamp2Get &&
    stamp3Get &&
    stamp4Get
  ){

    setTimeout(() => {

      alert("スタンプラリー コンプリート！！");

    }, 300);

  }

}

</script>



</body>
</html>
