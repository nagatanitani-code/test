<script>
// =========================
// AR開始
// =========================

startBtn.addEventListener("click", async () => {

  menuScreen.style.display = "none";

  mainScene.style.display = "block";

  backToMenuBtn.style.display = "block";

await new Promise(resolve => 
setTimeout(resolve, 200)
 );

  const arSystem =
    mainScene.systems["mindar-image-system"];

  if(arSystem){

      await arSystem.start();

  }

});


// =========================
// メニューへ戻る
// =========================

backToMenuBtn.addEventListener("click", async () => {

  const arSystem =
    mainScene.systems["mindar-image-system"];

  if(arSystem){

    try{

      await arSystem.stop();

    }catch(e){

      console.log("AR stop error", e);

    }

  }

  mainScene.style.display = "none";

  menuScreen.style.display = "flex";

  backToMenuBtn.style.display = "none";

});






let menuStampOpen = false;
let menuTreasureOpen = false;




function autoFitPlane(
  imagePath,
  planeId,
  maxSize = 2.5,
  type = ""
){
  const img = new Image();

  img.onload = () => {

    const aspect =
      img.width / img.height;

    const plane =
      document.querySelector(planeId);

    if(!plane) return;

    let width;
    let height;

    if(aspect >= 1){

      width = maxSize;
      height = maxSize / aspect;

    }else{

      height = maxSize;
      width = maxSize * aspect;

    }

    plane.setAttribute("width", width);
    plane.setAttribute("height", height);

    // ←追加
    if(type === "girl"){
      girlScaleX = width;
      girlScaleY = height;
    }

    if(type === "animal"){
      animalScaleX = width;
      animalScaleY = height;
    }

    if(type === "alien"){
      alienScaleX = width;
      alienScaleY = height;
    }

  };

  img.src = imagePath;
}



autoFitPlane(
  "girl.jpg",
  "#girlPlane",
  2.5,
  "girl"
);

autoFitPlane(
  "animal.jpg",
  "#animalPlane",
  2.5,
  "animal"
);

autoFitPlane(
  "alien.jpg",
  "#alienPlane",
  2.5,
  "alien"
);

// 今使うターゲット


function handleTouch(event){

  const camera = document.querySelector("[camera]");
  if(!camera) return;

  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  const x = event.touches ? event.touches[0].clientX : event.clientX;
  const y = event.touches ? event.touches[0].clientY : event.clientY;

  mouse.x = (x / window.innerWidth) * 2 - 1;
  mouse.y = -(y / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera.getObject3D("camera"));

  const clickables = document.querySelectorAll(".clickable");

 
const objects = [];

clickables.forEach(el => {

  if(!el.object3D.visible) return;

  el.object3D.traverse(obj => {

    if(obj.isMesh){

      objects.push(obj);

    }

  });

});



  const intersects = raycaster.intersectObjects(objects, true);

  if (intersects.length === 0) return;

  const hitEl =
    intersects[0].object.el ||
    intersects[0].object.parent?.el;

  if (!hitEl) return;

const target =
 targets.find(t => t.id === hitEl.id) ||
  animalTargets.find(t => t.id === hitEl.id) ||
  alienTargets.find(t => t.id === hitEl.id);

  if (!target || target.found) return;

  target.found = true;
saveGame();

  // UI
  effect.innerHTML = target.name + " 発見!!";
  effect.style.display = "block";

  const checkUI = document.querySelector("#guideCheck_" + target.id);
  if (checkUI) checkUI.style.display = "block";

  setTimeout(() => effect.style.display = "none", 1000);

  // 3Dチェック表示
  const check = document.createElement("a-plane");
  check.setAttribute("src", "#checkImg");
const isAnimal =
  animalTargets.find(t => t.id === target.id);

const isAlien =
  alienTargets.find(t => t.id === target.id);


const posX =
  isAnimal
  ? target.x * animalScaleX
  : isAlien
  ? target.x * alienScaleX
  : target.x * girlScaleX;

const posY =
  isAnimal
  ? target.y * animalScaleY
  : isAlien
  ? target.y * alienScaleY
  : target.y * girlScaleY;


check.setAttribute(
  "position",
  `${posX} ${posY} 0.08`
);


const checkSize = target.guideSize * 1.6;

check.setAttribute("width", checkSize);
check.setAttribute("height", checkSize);

  check.setAttribute("material", "shader: flat; transparent: true");

let parentContainer = "#guideContainer";

if(animalTargets.find(t => t.id === target.id)){
  parentContainer = "#animalGuideContainer";
}

if(alienTargets.find(t => t.id === target.id)){
  parentContainer = "#alienGuideContainer";
}


document.querySelector(parentContainer)
  .appendChild(check);
}

function setupGuideCropAuto({

  cropSelector,
  targets,
  imageUrl,
  scaleX = 1,
  scaleY = 1

}){

  const img = new Image();

  img.onload = () => {

    const imageWidth = img.width;
    const imageHeight = img.height;

    const boxSize = 90;

    targets.forEach(target => {

      const crop =
        document.querySelector(
          cropSelector + target.id
        );

      // =====================
      // AR座標 → 画像ピクセル座標
      // =====================

const imageX =
  ((target.x * scaleX) + scaleX / 2)
  / scaleX
  * imageWidth;

const imageY =
  ((scaleY / 2) - (target.y * scaleY))
  / scaleY
  * imageHeight;



      // =====================
      // 切り抜きサイズ
      // =====================

     const cropWidth =
  (target.guideSize / scaleX) * imageWidth;

const cropHeight =
  (target.guideSize / scaleY) * imageHeight;

      // =====================
      // 背景サイズ
      // =====================

      const bgWidth =
        imageWidth * (boxSize / cropWidth);

      const bgHeight =
        imageHeight * (boxSize / cropHeight);

      crop.style.backgroundImage =
        `url("${imageUrl}")`;

      crop.style.backgroundSize =
        `${bgWidth}px ${bgHeight}px`;

      // =====================
      // 背景位置
      // =====================

      const posX =
        boxSize / 2 -
        imageX * (boxSize / cropWidth);

      const posY =
        boxSize / 2 -
        imageY * (boxSize / cropHeight);

      crop.style.backgroundPosition =
        `${posX}px ${posY}px`;

    });

  };

  img.src = imageUrl;

}
