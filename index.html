<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #effect {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: yellow;
      font-size: 48px;
      font-weight: bold;
      display: none;
      z-index: 999;
      animation: pop 0.8s ease;
    }



    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.2); opacity:0; }
      50% { transform: translate(-50%, -50%) scale(1.4); }
      100% { transform: translate(-50%, -50%) scale(1); opacity:1; }
    }
#missionBox{

  position: fixed;

  top: 20px;
  left: 50%;

  transform: translateX(-50%);

  background: rgba(0,0,0,0.7);

  color: white;

  padding: 12px 24px;

  border-radius: 14px;

  z-index: 999;

  text-align: center;

}

<div id="treasureBox">

  <div id="treasureTitle">
    宝発見数
  </div>

  <div id="treasureCount">
    0 / 1
  </div>

  <img
    id="treasureImage"
    src=""
    style="
      width:120px;
      display:none;
      margin-top:10px;
      border-radius:12px;
    "
  >

</div>


#missionTitle{

  font-size: 16px;

}

#missionText{

  font-size: 28px;
  font-weight: bold;

}

#treasureBox{

  position: fixed;

  right: 20px;
  top: 20px;

  background: rgba(0,0,0,0.7);

  color: white;

  padding: 16px;

  border-radius: 14px;

  z-index: 999;

  text-align: center;

}

#treasureTitle{
  font-size:18px;
}

#treasureCount{
  font-size:32px;
  font-weight:bold;
}


  </style>
</head>

<body>

<div id="effect">発見!!</div>
<div id="missionBox">

  <div id="missionTitle">
    お題
  </div>

  <div id="missionText">
    読み込み待機中
  </div>
</div>



<a-scene
  mindar-image="imageTargetSrc: targets.mind; maxTrack: 3;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

<a-assets>
 <img id="img1" src="ar-image1.jpg" />
 <img id="img2" src="ar-image2.jpg" />
 <img id="img3" src="ar-image3.jpg" />
 </a-assets>


<a-camera
  camera
  position="0 0 0"
  look-controls="enabled: false">
</a-camera>

  <!-- 画像1 -->
<a-entity
  id="target1"
  mindar-image-target="targetIndex: 0">


<a-plane src="#img1" width="1" height="1"material="shader: flat; transparent: true;"> </a-plane>
   <a-plane class="clickable" color="red" opacity="0.3" width="0.2" height="0.2" position="0.15 -0.1 0.02"> </a-plane>

  </a-entity>

  <!-- 画像2 -->
  <a-entity id="target2" mindar-image-target="targetIndex: 1">

  <a-plane src="#img2"  width="1" height="1"material="shader: flat; transparent: true;"> </a-plane>
<a-plane class="clickable" data-name="女の子"color="red" opacity="0.3" width="0.2" height="0.2" position="0.15 -0.1 0.02" > </a-plane>

 </a-entity>
<!-- 画像3 --> 
<a-entity id="target3" mindar-image-target="targetIndex: 2">
<a-plane src="#img3"  width="1" height="1"material="shader: flat; transparent: true;"> </a-plane>
<a-plane class="clickable" data-name="きのこ"color="red" opacity="0.3" width="0.2" height="0.2" position="0.15 -0.1 0.02"> </a-plane>

</a-entity>
</a-scene>




<script>

const effect = document.querySelector("#effect");
const scene = document.querySelector("a-scene");

scene.addEventListener("loaded", () => {

  // スマホタップ
  window.addEventListener("touchstart", handleTouch);

  // PCクリック
  window.addEventListener("click", handleTouch);

});



function handleTouch(event){

  console.log("タッチ検出");

  // camera取得
  const camera = document.querySelector("[camera]");

  if(!camera){
    console.log("camera取得失敗");
    return;
  }

  // raycaster
  const raycaster = new THREE.Raycaster();

  // 座標
  const mouse = new THREE.Vector2();

  // タッチ位置
  const x = event.touches ?
    event.touches[0].clientX :
    event.clientX;

  const y = event.touches ?
    event.touches[0].clientY :
    event.clientY;

  // -1〜1変換
  mouse.x = (x / window.innerWidth) * 2 - 1;
  mouse.y = -(y / window.innerHeight) * 2 + 1;

  // ray発射
  raycaster.setFromCamera(
    mouse,
    camera.getObject3D("camera")
  );

  // clickable取得
  const clickable =
    document.querySelectorAll(".clickable");

  const objects = [];

  clickable.forEach(el => {

    if(el.object3D.visible){
      objects.push(el.object3D);
    }

  });

  console.log(objects);

  // 判定
  const intersects =
    raycaster.intersectObjects(objects, true);

  console.log(intersects);

  // 当たった
if(intersects.length > 0){
const foundName =
intersects[0].object.el.dataset.name;

effect.innerHTML =
  foundName + " 発見!!";

intersects[0].object.visible = false;

effect.style.display = "block";

const audio = new Audio("discover.mp3");
audio.play();

setTimeout(() => {
  effect.style.display = "none";
}, 1000);
});


}

const missionText =
document.querySelector("#missionText");

const treasureCount =
document.querySelector("#treasureCount");

const treasureImage =
document.querySelector("#treasureImage");

let foundTreasure = 0;
const totalTreasure = 1;


document
.querySelector("#target1")
.addEventListener("targetFound", () => {

  missionText.innerHTML =
    "宝発見！";

  foundTreasure++;

  treasureCount.innerHTML =
    foundTreasure + " / " + totalTreasure;

  treasureImage.src =
    "treasure.png";

  treasureImage.style.display =
    "block";

});


document
.querySelector("#target2")
.addEventListener("targetFound", () => {

  missionText.innerHTML =
    "女の子を探せ！";

});

document
.querySelector("#target3")
.addEventListener("targetFound", () => {

  missionText.innerHTML =
    "きのこを探せ！";

});



</script>



</body>
</html>
