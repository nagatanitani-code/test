<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #effect {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: yellow;
      font-size: 48px;
      font-weight: bold;
      display: none;
      z-index: 999;
      animation: pop 0.8s ease;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.2); opacity:0; }
      50% { transform: translate(-50%, -50%) scale(1.4); }
      100% { transform: translate(-50%, -50%) scale(1); opacity:1; }
    }
  </style>
</head>

<body>

<div id="effect">発見!!</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; maxTrack: 3;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

<a-assets>
 <img id="img1" src="ar-image1.jpg" />
 <img id="img2" src="ar-image2.jpg" />
 <img id="img3" src="ar-image3.jpg" />
 </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false">

    <!-- クリック判定 -->
   
</a-camera>

  <!-- 画像1 -->
  <a-entity mindar-image-target="targetIndex: 0">
<a-plane src="#img1" width="1" height="1"material="shader: flat; transparent: true;"> </a-plane>
   <a-plane class="clickable" color="red" opacity="0.3" width="0.2" height="0.2" position="0.15 -0.1 0.02"> </a-plane>

  </a-entity>

  <!-- 画像2 -->
  <a-entity mindar-image-target="targetIndex: 1">

  <a-plane src="#img2"  width="1" height="1"material="shader: flat; transparent: true;"> </a-plane>
<a-plane class="clickable" color="red" opacity="0.3" width="0.2" height="0.2" position="0.15 -0.1 0.02" > </a-plane>

 </a-entity>
<!-- 画像3 --> 
<a-entity mindar-image-target="targetIndex: 2">
<a-plane src="#img3"  width="1" height="1"material="shader: flat; transparent: true;"> </a-plane>
<a-plane class="clickable" color="red" opacity="0.3" width="0.2" height="0.2" position="0.15 -0.1 0.02"> </a-plane>

</a-entity>
</a-scene>



<script> 
const effect = document.querySelector("#effect"); const scene = document.querySelector("a-scene"); 
scene.addEventListener("loaded", () => { // 画面タップ window.addEventListener("touchstart", handleTouch); // PCクリック 
window.addEventListener("click", handleTouch); });
 function handleTouch(event) { // camera取得 const camera = document.querySelector("[camera]"); // raycaster作成
 const raycaster = new THREE.Raycaster(); // マウス座標
 const mouse = new THREE.Vector2(); // タッチ位置 
const x = event.touches ? event.touches[0].clientX : event.clientX; const y = event.touches ? event.touches[0].clientY : event.clientY; // -1〜1へ変換
 mouse.x = (x / window.innerWidth) * 2 - 1; mouse.y = -(y / window.innerHeight) * 2 + 1; // ray発射 
raycaster.setFromCamera(mouse, camera.getObject3D('camera')); // clickable取得 
const clickable = document.querySelectorAll(".clickable"); const objects = []; clickable.forEach(el => { if(el.object3D.visible){ objects.push(el.object3D); } }); // 当たり判定
 const intersects = raycaster.intersectObjects(objects, true); if(intersects.length > 0){ console.log("発見！"); effect.style.display = "block"; const audio = new Audio("discover.mp3"); audio.play(); setTimeout(() => { effect.style.display = "none"; }, 1000); } }
 </script>


</body>
</html>
