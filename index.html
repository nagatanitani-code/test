<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #effect {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: yellow;
      font-size: 48px;
      font-weight: bold;
      display: none;
      z-index: 999;
      animation: pop 0.8s ease;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.2); opacity:0; }
      50% { transform: translate(-50%, -50%) scale(1.4); }
      100% { transform: translate(-50%, -50%) scale(1); opacity:1; }
    }
  </style>
</head>

<body>

<div id="effect">発見!!</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; maxTrack: 2;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera
    position="0 0 0"
    look-controls="enabled: false">

    <!-- クリック判定 -->
    <a-entity
      cursor="fuse:false; rayOrigin: mouse;"
raycaster="objects: .clickable"
      raycaster="objects: .clickable">
    </a-entity>

  </a-camera>

  <!-- 画像1 -->
  <a-entity mindar-image-target="targetIndex: 0">

    <a-plane
      src="ar-image1.png"
      class="clickable"
      position="0 0 0.1"
      width="1"
      height="1"
opacity="0.8"
      material="transparent:true">
    </a-plane>

  </a-entity>

  <!-- 画像2 -->
  <a-entity mindar-image-target="targetIndex: 1">

    <a-plane
      src="ar-image2.png"
      class="clickable"
      position="0 0 0.1"
      width="1"
      height="1"
opacity="0.8">
    </a-plane>

  </a-entity>
<!-- 画像3 --> 
<a-entity mindar-image-target="targetIndex: 2">
 <a-plane src="ar-image3.png" class="clickable" position="0 0 0.1" width="1" height="1" opacity="0.8"material="transparent:true"> 
</a-plane>
 </a-entity>
</a-scene>


<script>

const effect = document.querySelector("#effect");

// scene読み込み後
document.querySelector("a-scene").addEventListener("loaded", () => {

  document.querySelectorAll(".clickable").forEach(el => {

    el.addEventListener("click", () => {

      console.log("クリック成功");

      // 発見表示
      effect.style.display = "block";

      // 音
      const audio = new Audio("discover.mp3");
      audio.play();

      // 1秒後消す
      setTimeout(() => {
        effect.style.display = "none";
      }, 1000);

    });

  });

});

</script>

</body>
</html>
