<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サイトリンク集</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            color: #2c3e50;
        }
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-item {
            display: block;
            padding: 12px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
        }
        .link-item:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        .link-item:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>マイ リンク集</h1>
    <div class="link-list">
        <a class="link-item" href="https://nagatanitani-code.github.io/test/treasure.html" target="_blank" rel="noopener noreferrer">Treasure</a>
        <a class="link-item" href="https://nagatanitani-code.github.io/test/photo.html" target="_blank" rel="noopener noreferrer">Photo</a>
        <a class="link-item" href="https://nagatanitani-code.github.io/test/stamp.html" target="_blank" rel="noopener noreferrer">Stamp</a>
        <a class="link-item" href="https://nagatanitani-code.github.io/test/picture.html" target="_blank" rel="noopener noreferrer">Picture</a>
    </div>
</div>

</body>
</html>
